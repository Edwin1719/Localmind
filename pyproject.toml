[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

markers = [
    "unit: Unit tests (no external services required)",
    "integration: Integration tests (require wigolo daemon, Ollama, etc.)",
    "e2e: End-to-end tests (require full stack running)",
    "slow: Tests that take longer than 5 seconds",
]

addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "--color=yes",
]
